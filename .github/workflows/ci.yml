name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 for JavaScript-based actions (see GitHub notice)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      - name: Create sample Parquet for tests
        run: |
          python - <<'PY'
          import os
          import pandas as pd

          out_dir = os.path.join('lake', 'parquet')
          os.makedirs(out_dir, exist_ok=True)

          # Sample data must include columns referenced by transform.sql
          df = pd.DataFrame({
              'date': ['2017-07-01', '2017-07-01', '2017-07-02', '2017-07-03'],
              'time': ['12:00:00','12:05:00','12:10:00','12:15:00'],
              'username': ['viktor', 'viktor', 'viktor', 'viktor'],
              'acceleration_x': [0.1, 0.2, 0.15, 0.12],
              'acceleration_y': [0.0, 0.1, -0.05, 0.02],
              'acceleration_z': [0.0, 0.0, 0.0, 0.01],
              'gyro_x': [0.01, 0.02, -0.01, 0.0],
              'gyro_y': [0.0, 0.005, -0.002, 0.001],
              'gyro_z': [0.0, 0.0, 0.0, 0.0],
              'activity': [0, 1, 0, 1],
              'wrist': [0, 1, 0, 1],
          })
          df['date'] = pd.to_datetime(df['date'])
          df.to_parquet(os.path.join(out_dir, 'runs.parquet'), index=False)
          print('Wrote sample parquet to', os.path.join(out_dir, 'runs.parquet'))
          PY
      - name: Run tests
        run: |
          python -m pytest -q
