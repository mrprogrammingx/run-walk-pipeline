name: Airflow integration smoke

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  airflow-integration:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Compose
        uses: docker/setup-buildx-action@v3
      - name: "Debug: runner and docker info"
        run: |
          uname -a || true
          echo "Python:" $(python3 --version || true)
          echo "Docker:" $(docker --version || true)
          echo "Docker Compose:" $(docker compose version || true)
      - name: Install Python deps for CI
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pandas pyarrow
      - name: Create sample parquet for CI
        run: |
          python3 scripts/create_sample_parquet.py
      - name: Start docker-compose
        run: |
          set -x
          docker compose -f docker-compose.yml up -d --build || (docker compose ps --all || true; docker compose logs --no-color --timestamps || true; exit 1)
      - name: Run Airflow DB migrations (wait for Airflow readiness)
        run: |
          set -e
          # Ensure the Airflow metadata DB is initialized before running any CLI commands
          for i in $(seq 1 60); do
            docker compose exec -T postgres pg_isready -U airflow >/dev/null 2>&1 && break || sleep 2
          done
          # Wait for the Airflow container to be responsive (this may take longer
          # if the image is installing additional Python packages at startup).
          for i in $(seq 1 60); do
            docker compose exec -T airflow airflow info >/dev/null 2>&1 && break || sleep 2
          done
          # Run migrations and retry a few times to tolerate transient startup races
          for i in $(seq 1 12); do
            if docker compose exec -T airflow airflow db migrate; then
              echo "airflow db migrate succeeded"
              break
            else
              echo "airflow db migrate failed, retrying..."
              sleep 5
            fi
          done
      - name: Create simple-auth generated passwords file
        run: |
          # Create the generated simple auth passwords file so admin/admin works with SimpleAuthManager
          docker compose exec -T airflow python -c 'import json, pathlib; pathlib.Path("/opt/airflow/simple_auth_manager_passwords.json.generated").write_text(json.dumps({"admin":"admin"})); print("wrote /opt/airflow/simple_auth_manager_passwords.json.generated")'
      - name: Restart Airflow container to pick up auth file
        run: |
          docker compose restart airflow
      - name: Wait for Airflow
        run: |
          for i in $(seq 1 60); do
            docker compose exec -T airflow airflow info >/dev/null 2>&1 && break || sleep 2
          done
      - name: Show DAG import errors (if any)
        run: |
          docker compose exec -T airflow airflow dags list-import-errors || true
      - name: List DAGs
        run: |
          docker compose exec -T airflow airflow dags list
      - name: Trigger DAG
        run: |
          RUN_ID="ci_run_$(date +%s)"
          echo "Triggering DAG with run id: $RUN_ID"
          docker compose exec -T airflow airflow dags trigger run_walk_pipeline --run-id "$RUN_ID" || true
          echo "$RUN_ID" > /tmp/ci_dag_run_id
      - name: Poll DAG run status
        run: |
          # Poll the last few DAG runs for success/failure. Timeout after ~5 minutes.
          set -e
          RUN_ID=$(cat /tmp/ci_dag_run_id || true)
          for i in $(seq 1 60); do
            echo "Checking DAG run $RUN_ID (attempt $i)"
            out=$(docker compose exec -T airflow airflow dags list-runs -d run_walk_pipeline --run-id "$RUN_ID" --limit 5 || true)
            echo "$out"
            echo "$out" | grep -iq "success" && echo "DAG run succeeded" && exit 0 || true
            echo "$out" | grep -iq "failed" && echo "DAG run failed" && exit 1 || true
            sleep 5
          done
          echo "Timed out waiting for DAG run to complete" && exit 1
      - name: Collect container & Airflow logs (upload as artifact)
        if: always()
        run: |
          set -e || true
          mkdir -p /tmp/ci_logs
          echo "Saving docker compose logs to /tmp/ci_logs/docker_compose_all.log"
          docker compose logs --no-color --timestamps > /tmp/ci_logs/docker_compose_all.log || true
          echo "Saving airflow container logs to /tmp/ci_logs/airflow.log"
          docker compose logs airflow --no-color --timestamps > /tmp/ci_logs/airflow.log || true
          echo "Saving postgres container logs to /tmp/ci_logs/postgres.log"
          docker compose logs postgres --no-color --timestamps > /tmp/ci_logs/postgres.log || true
          # Try to collect task logs from the airflow logs folder inside the container
          docker compose exec -T airflow sh -c "mkdir -p /tmp/ci_task_logs; cp -r /opt/airflow/logs /tmp/ci_task_logs || true; tar -czf /tmp/ci_logs/airflow_task_logs.tar.gz -C /tmp/ci_task_logs logs || true" || true
          ls -lah /tmp/ci_logs || true
      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-container-logs
          path: /tmp/ci_logs
      - name: Tear down
        if: always()
        run: docker compose down -v
